<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Get In Touch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2d2d2d;
            --accent: #d4a574;
            --light-bg: #fafafa;
            --text-dark: #333;
            --text-light: #666;
            --white: #ffffff;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Georgia', 'Garamond', serif;
            line-height: 1.8;
            color: var(--text-dark);
            background-color: var(--white);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--white);
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 2px;
            text-decoration: none;
            margin-right: auto;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2.5rem;
            margin-left: auto;
        }

        nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.95rem;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--accent);
        }

        section {
            padding: 80px 0;
            margin-top: 80px;
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: var(--primary);
            text-align: center;
        }

        .contact-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin-top: 3rem;
        }

        .contact-info h3 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .contact-info p {
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
        }

        .contact-form button {
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }

        .contact-form button:hover {
            background: var(--accent);
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .social-links a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
        }

        .social-links a:hover {
            color: var(--accent);
        }

        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 3rem 0;
            margin-top: 3rem;
        }

        .footer-social {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .footer-social a {
            color: white;
            text-decoration: none;
            transition: var(--transition);
        }

        .footer-social a:hover {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            nav ul {
                display: none;
            }

            .contact-content {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">ARTIST NAME</a>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="services.html">WHAT I DO</a></li>
                <li><a href="portfolio.html">WORK</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </div>
    </nav>

    <section>
        <div class="container">
            <h2>Get In Touch</h2>
            <div class="contact-content">
                <div class="contact-info">
                    <h3>Let's Connect</h3>
                    <p><strong>Email:</strong><br>your.email@example.com</p>
                    <p><strong>Phone:</strong><br>+1 (555) 123-4567</p>
                    <p><strong>Location:</strong><br>Your City, Country</p>
                    <p><strong>Follow My Work:</strong></p>
                    <div class="social-links">
                        <a href="#">Instagram</a>
                        <a href="#">Twitter</a>
                        <a href="#">LinkedIn</a>
                    </div>
                </div>
                <form class="contact-form" id="contactForm">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <input type="text" placeholder="Subject" required>
                    <textarea placeholder="Tell me about your project..." rows="6" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-social">
            <a href="#">Instagram</a>
            <a href="#">Twitter</a>
            <a href="#">Email</a>
        </div>
        <p>&copy; 2026 Your Name. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.querySelector('input[type="text"]').value;
            alert(`Thank you, ${name}! I'll get back to you soon.`);
            document.getElementById('contactForm').reset();
        });
    </script>
</body>
</html>
