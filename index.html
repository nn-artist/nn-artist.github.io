<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2d2d2d;
            --accent: #d4a574;
            --light-bg: #fafafa;
            --text-dark: #333;
            --text-light: #666;
            --white: #ffffff;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Georgia', 'Garamond', serif;
            line-height: 1.8;
            color: var(--text-dark);
            background-color: var(--white);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--white);
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 2px;
            text-decoration: none;
            margin-right: auto;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2.5rem;
            margin-left: auto;
        }

        nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.95rem;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--accent);
        }

        /* Hero Section */
        .hero {
            margin-top: 80px;
            padding: 100px 0;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.3rem;
            color: var(--text-light);
            margin-bottom: 2rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-image {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
            margin: 2rem auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: 2px solid var(--primary);
            background: var(--white);
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            border-radius: 3px;
        }

        .btn:hover {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 3rem 0;
            margin-top: 3rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .social-links a {
            color: white;
            text-decoration: none;
            transition: var(--transition);
        }

        .social-links a:hover {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            nav ul {
                display: none;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .container {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">ARTIST NAME</a>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="services.html">WHAT I DO</a></li>
                <li><a href="portfolio.html">WORK</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <h1>Creative Artist & Designer</h1>
            <p>Bringing imagination to life through art, design, and creative storytelling</p>
            <img src="https://via.placeholder.com/300?text=Your+Photo" alt="Artist" class="hero-image">
            <div class="cta-buttons">
                <a href="portfolio.html" class="btn btn-primary">View My Work</a>
                <a href="contact.html" class="btn">Get In Touch</a>
            </div>
        </div>
    </section>

    <footer>
        <div class="social-links">
            <a href="#">Instagram</a>
            <a href="#">Twitter</a>
            <a href="#">Email</a>
        </div>
        <p>&copy; 2026 Your Name. All rights reserved.</p>
    </footer>
</body>
</html>
